openapi: 3.0.3
info:
  title: LUCY Unified API Contract
  version: 1.0.0
  description: 'Bộ Swagger/OpenAPI chung cho dự án LUCY. Dùng để chia API cho 6 thành viên: Auth (.NET), Payment (.NET), Content
    & LMS (Java Spring Boot), Realtime (Node.js) và Flutter client.'
servers:
- url: http://localhost:8088
  description: API Gateway hoặc reverse proxy khi tích hợp
- url: http://localhost:5001
  description: Auth Service - .NET Core
- url: http://localhost:5002
  description: Payment Service - .NET Core
- url: http://localhost:8080
  description: Content & LMS Service - Java Spring Boot
- url: http://localhost:3001
  description: Realtime Service - Node.js
tags:
- name: Auth - Bảo
  description: Đăng ký, đăng nhập, phân quyền, xét duyệt role.
- name: Admin
  description: Quản trị user, duyệt mentor/creator, xem giao dịch.
- name: LMS - Vinh
  description: Người học, lộ trình học, progress, quiz, nội dung đã mua.
- name: Mentor - Kim
  description: Tạo phòng, lên lịch, tài liệu, quiz, quản lý học viên.
- name: Creator - Đạt
  description: Live chuyên sâu, recording, podcast, nội dung trả phí.
- name: Payment - Linh
  description: Ví, nạp tiền, donate, quà, mua content/live, rút tiền.
- name: Realtime - Hải
  description: Agora token, join/leave room, mic, giơ tay, chat, record.
- name: Internal APIs
  description: API nội bộ giữa các service.
paths:
  /api/auth/register:
    post:
      tags:
      - Auth - Bảo
      summary: Đăng ký tài khoản Lucy ẩn danh, được truy cập ngay
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          description: Bad Request
