      tags:
      - Admin
      summary: Admin xem các phòng realtime đang online
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealtimeRoomStateListResponse'
      servers:
      - url: http://localhost:3001
  /api/admin/realtime/rooms/{roomId}/state:
    get:
      tags:
      - Admin
      summary: Admin xem trạng thái realtime của một phòng
      parameters:
      - name: roomId
        in: path
        required: true
        schema: *id001
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealtimeRoomStateResponse'
      servers:
      - url: http://localhost:3001
  /api/admin/realtime/socket-status:
    get:
      tags:
      - Admin
      summary: Admin debug trạng thái socket
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocketStatusResponse'
      servers:
      - url: http://localhost:3001
  /api/admin/realtime/rooms/{roomId}/force-close:
    post:
      tags:
      - Admin
      summary: Admin force close phòng realtime
      parameters:
      - name: roomId
        in: path
        required: true
        schema: *id001
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDecisionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealtimeRoomStateResponse'
      servers:
      - url: http://localhost:3001
  /api/internal/notifications/room-created:
    post:
      tags:
      - Internal APIs
      summary: Java gọi notification service khi mentor/creator tạo phòng
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomNotificationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      servers:
      - url: http://localhost:8088
  /api/internal/notifications/room-opened:
    post:
      tags:
      - Internal APIs
      summary: Java gọi notification service khi phòng lên lịch được mở
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomNotificationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
      servers:
      - url: http://localhost:8088
