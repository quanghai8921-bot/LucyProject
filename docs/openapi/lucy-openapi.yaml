openapi: 3.0.3
info:
  title: Backend API Documentation
  description: OpenAPI contract definitions mapped from controllers.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local Server

paths:
  # ==========================================
  # AGORA CONTROLLER
  # ==========================================
  /api/agora/token:
    post:
      tags:
        - Agora
      summary: Generate Agora RT/RTT token
      responses:
        '200':
          description: Token generated successfully

  # ==========================================
  # PAYMENT CONTROLLER
  # ==========================================
  /api/payment/wallet:
    get:
      tags:
        - Payment
      summary: Get wallet details
      responses:
        '200':
          description: OK

  /api/payment/transactions:
    get:
      tags:
        - Payment
      summary: List transactions
      responses:
        '200':
          description: OK

  /api/payment/gifts:
    get:
      tags:
        - Payment
      summary: List gifts
      responses:
        '200':
          description: OK

  /api/payment/deposit:
    post:
      tags:
        - Payment
      summary: Create top-up order
      responses:
        '200':
          description: Order created

  /api/payment/purchase/content:
    post:
      tags:
        - Payment
      summary: Purchase paid content
      responses:
        '200':
          description: Content purchased

  /api/payment/purchase/live:
    post:
      tags:
        - Payment
      summary: Purchase live room ticket
      responses:
        '200':
          description: Ticket purchased

  /api/payment/donate:
    post:
      tags:
        - Payment
      summary: Donate gifts
      responses:
        '200':
          description: Gift donated

  /api/payment/transfer:
    post:
      tags:
        - Payment
      summary: Transfer money (placeholder/implementations)
      responses:
        '200':
          description: Money transferred

  /api/payment/withdraw:
    post:
      tags:
        - Payment
      summary: Request withdrawal
      responses:
        '200':
          description: Withdrawal requested

  /api/payment/settings/momo:
    get:
      tags:
        - Payment
      summary: Get MoMo receiver settings (non-admin)
      responses:
        '200':
          description: OK

  /api/payment/admin/settings/momo:
    get:
      tags:
        - Payment Admin
      summary: Get MoMo setting
      responses:
        '200':
          description: OK
    post:
      tags:
        - Payment Admin
      summary: Save MoMo setting
      responses:
        '200':
          description: Settings saved

  /api/payment/admin/settings/momo/qr:
    post:
      tags:
        - Payment Admin
      summary: Upload MoMo QR code image
      responses:
        '200':
          description: QR uploaded

  /api/payment/admin/topup-orders:
    get:
      tags:
        - Payment Admin
      summary: List top-up orders
      responses:
        '200':
          description: OK

  /api/payment/admin/topup-orders/{topUpOrderId}/approve:
    post:
      tags:
        - Payment Admin
      summary: Approve top-up
      parameters:
        - name: topUpOrderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Top-up approved

  /api/payment/admin/topup-orders/{topUpOrderId}/reject:
    post:
      tags:
        - Payment Admin
      summary: Reject top-up
      parameters:
        - name: topUpOrderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Top-up rejected

  /api/payment/admin/withdraw-requests:
    get:
      tags:
        - Payment Admin
      summary: List withdrawal requests
      responses:
        '200':
          description: OK

  /api/payment/admin/withdraw/approve/{withdrawRequestId}:
    post:
      tags:
        - Payment Admin
      summary: Approve withdrawal
      parameters:
        - name: withdrawRequestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Withdrawal approved

  /api/payment/admin/withdraw/reject/{withdrawRequestId}:
    post:
      tags:
        - Payment Admin
      summary: Reject withdrawal
      parameters:
        - name: withdrawRequestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Withdrawal rejected

  # ==========================================
  # ROOM CONTROLLER
  # ==========================================
  /api/mentor/rooms:
    post:
      tags:
        - Mentor Room
      summary: Create room
      responses:
        '201':
          description: Room created
    get:
      tags:
        - Mentor Room
      summary: List rooms
      responses:
        '200':
          description: OK

  /api/mentor/rooms/mentor/{hostUserId}:
    get:
      tags:
        - Mentor Room
      summary: List rooms hosted by mentor
      parameters:
        - name: hostUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /api/mentor/rooms/{roomId}/end:
    post:
      tags:
        - Mentor Room
      summary: End a room session
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Room session ended

  /api/mentor/rooms/{roomId}/participants:
    get:
      tags:
        - Mentor Room
      summary: Get list of participants in room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /api/mentor/rooms/{roomId}/open:
    post:
      tags:
        - Mentor Room
      summary: Open room session
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Room opened

  /api/mentor/rooms/{roomId}/sublevels/{subLevelId}/complete:
    post:
      tags:
        - Mentor Room
      summary: Mark sub-level complete
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
        - name: subLevelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Sub-level completed

  # ==========================================
  # LEARNER ROOM CONTROLLER
  # ==========================================
  /api/learner/rooms/{roomId}/join:
    post:
      tags:
        - Learner Room
      summary: Join a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Joined room

  /api/learner/rooms/{roomId}/leave:
    post:
      tags:
        - Learner Room
      summary: Leave a room
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Left room

  /api/learner/rooms/{roomId}/mic:
    patch:
      tags:
        - Learner Room
      summary: Toggle microphone
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Microphone toggled

  /api/learner/rooms/{roomId}/hand-raise:
    patch:
      tags:
        - Learner Room
      summary: Toggle hand raise status
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Hand raise status toggled

  /api/learner/rooms/{roomId}/participants:
    get:
      tags:
        - Learner Room
      summary: List participants
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  # ==========================================
  # PINNED MATERIAL CONTROLLER
  # ==========================================
  /api/mentor/rooms/{roomId}/pinned-materials:
    get:
      tags:
        - Pinned Material
      summary: List pinned materials
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    post:
      tags:
        - Pinned Material
      summary: Upload/Pin a material
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Material pinned

  /api/mentor/rooms/{roomId}/pinned-materials/{pinnedMaterialId}:
    delete:
      tags:
        - Pinned Material
      summary: Unpin a material
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
        - name: pinnedMaterialId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Material unpinned

  # ==========================================
  # CREATOR CONTENT CONTROLLER
  # ==========================================
  /api/creator/contents:
    get:
      tags:
        - Creator Content
      summary: List/Search creator contents
      responses:
        '200':
          description: OK
    post:
      tags:
        - Creator Content
      summary: Create/Publish paid content
      responses:
        '201':
          description: Content created

  /api/creator/contents/videos:
    post:
      tags:
        - Creator Content
      summary: Upload video file
      responses:
        '201':
          description: Video uploaded
    get:
      tags:
        - Creator Content
      summary: Get public videos
      responses:
        '200':
          description: OK

  /api/creator/contents/creator/{creatorUserId}/videos:
    get:
      tags:
        - Creator Content
      summary: List creator's video materials
      parameters:
        - name: creatorUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  # ==========================================
  # AUTH / USER CONTROLLERS
  # ==========================================
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Anonymous/Quick register
      responses:
        '200':
          description: Registered successfully

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Login
      responses:
        '200':
          description: Logged in successfully

  /api/auth/register-mentor:
    post:
      tags:
        - Auth
      summary: Submit mentor application
      responses:
        '200':
          description: Application submitted

  /api/auth/register-creator:
    post:
      tags:
        - Auth
      summary: Submit creator application
      responses:
        '200':
          description: Application submitted

  /api/auth/profile:
    get:
      tags:
        - Profile
      summary: Get user profile
      responses:
        '200':
          description: OK
    put:
      tags:
        - Profile
      summary: Update user profile
      responses:
        '200':
          description: Profile updated

  /api/auth/profile/avatar:
    post:
      tags:
        - Profile
      summary: Upload avatar image
      responses:
        '200':
          description: Avatar uploaded

  /api/auth/admin/users:
    get:
      tags:
        - Admin User
      summary: List all users
      responses:
        '200':
          description: OK

  /api/auth/admin/users/assign-role:
    post:
      tags:
        - Admin User
      summary: Assign role to user
      responses:
        '200':
          description: Role assigned

  /api/auth/admin/mentor-applications:
    get:
      tags:
        - Admin Mentor Application
      summary: List mentor applications
      responses:
        '200':
          description: OK

  /api/auth/admin/mentor-applications/{applicationId}/approve:
    post:
      tags:
        - Admin Mentor Application
      summary: Approve application
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Application approved

  /api/auth/admin/mentor-applications/{applicationId}/reject:
    post:
      tags:
        - Admin Mentor Application
      summary: Reject application
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Application rejected

  /api/auth/admin/creator-applications:
    get:
      tags:
        - Admin Creator Application
      summary: List creator applications
      responses:
        '200':
          description: OK

  /api/auth/admin/creator-applications/{applicationId}/approve:
    post:
      tags:
        - Admin Creator Application
      summary: Approve application
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Application approved

  /api/auth/admin/creator-applications/{applicationId}/reject:
    post:
      tags:
        - Admin Creator Application
      summary: Reject application
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Application rejected

  # ==========================================
  # LEARNING CONTENT CONTROLLER
  # ==========================================
  /api/content/topics:
    get:
      tags:
        - Learning Content
      summary: Get topics
      responses:
        '200':
          description: OK

  /api/content/topics/{topicId}/stages:
    get:
      tags:
        - Learning Content
      summary: Get stages under a topic
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /api/content/stages/{stageId}/levels:
    get:
      tags:
        - Learning Content
      summary: Get levels under a stage
      parameters:
        - name: stageId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /api/content/levels/{levelId}/details:
    get:
      tags:
        - Learning Content
      summary: Get level details (including sub-levels and materials)
      parameters:
        - name: levelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK